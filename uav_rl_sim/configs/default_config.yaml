env:
  grid_size: 100       # 100x100 grid for terrain
  max_steps: 1000      # Max steps per episode
  dt: 0.1              # Time step
  uav_max_speed: 5.0
  uav_max_accel: 2.0
  uav_max_energy: 1000.0
  energy_drain_rate: 0.1
  action_scale: 1.0
  sensor_range: 20     # Range of heightmap/obstacle sensor
  wind_max_speed: 2.0
  terrain_roughness: 0.5
  num_obstacles: 30

rewards:
  step_penalty: -0.1
  energy_penalty: -0.01
  distance_reward_scale: 1.0
  goal_reward: 100.0
  collision_penalty: -100.0
  out_of_bounds_penalty: -50.0
  safe_clearance: 5.0  # Ideal height above terrain

training:
  algorithm: "PPO"     # "PPO" or "SAC"
  learning_rate: 0.0003
  gamma: 0.99
  batch_size: 64
  buffer_size: 100000  # For SAC
  ppo_clip_param: 0.2
  ppo_epochs: 10
  tau: 0.005           # For SAC target network update
  entropy_coef: 0.01   # For PPO
  alpha: 0.2           # For SAC entropy
  max_episodes: 5000
  save_freq: 100

data:
  mode: "synthetic"    # "synthetic" or "natural"
  natural_data_dir: "data/"
